; PlatformIO 配置文件 — FreeRTOS 多任务 Demo (STM32F103C8T6)
; 编译: pio run
; 烧录: pio run --target upload (需连接 ST-Link)
; 串口: pio device monitor

[env:bluepill_f103c8]
platform = ststm32
board = bluepill_f103c8
framework = stm32cube

; FreeRTOS 通过 CMSIS-RTOS 接口启用
build_flags =
    -DUSE_HAL_DRIVER
    -DSTM32F103xB
    -DARM_MATH_CM3
    -I inc

; 调试器配置
upload_protocol = stlink
debug_tool = stlink
debug_init_break = tbreak main

; 串口监视
monitor_speed = 115200
